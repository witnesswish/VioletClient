name: Build Project VioletClient on Windows

on:
  push:
    tags: 
      - "v*"
  workflow_dispatch:

env:
  QT_VERSION: 6.9.1
  QT_HOST: windows
  QT_TARGET: desktop
  QT_ARCH: win64_mingw

jobs:
  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        build-type: [Release, Debug]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: ${{ env.QT_VERSION }}
        host: ${{ env.QT_HOST }}
        target: ${{ env.QT_TARGET }}
        arch: ${{ env.QT_ARCH }}
        install-deps: true

    - name: Setup Ninja
      uses: seanmiddleditch/gha-setup-ninja@v3

    - name: Configure CMake
      run: |
        cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=${{matrix.build-type}} -DCMAKE_MAKE_PROGRAM=ninja -G "Ninja" -DCMAKE_PREFIX_PATH="${{ env.QT_DIR }}/lib/cmake"

    - name: Build
      run: |
        cmake --build ${{github.workspace}}/build --config ${{matrix.build-type}}

    - name: Test
      run: |
        cd ${{github.workspace}}/build
        ctest -C ${{matrix.build-type}} --verbose

    - name: Deploy (Release only)
      if: matrix.build-type == 'Release' && github.event_name == 'push'
      run: |
        cd ${{github.workspace}}/build
        cmake --install . --prefix package
        # 创建部署脚本并执行
        cmake -DCMAKE_INSTALL_PREFIX=package -P cmake_install.cmake
        # 如果有部署脚本，执行它
        if exist deploy_script.cmake (
          cmake -P deploy_script.cmake
        )

    - name: Verify files and Get Qt dependencies
      shell: powershell
      run: |
        $QT_BIN = "$env:QT_PATH/bin"
        & "windeployqt.exe" `
          --release `
          --no-compiler-runtime `
          --dir installer `
          "${{github.workspace}}/build/Release/VioletClient.exe"
        Copy-Item "${{github.workspace}}/build/Release/VioletClient.exe" installer
        Get-ChildItem -Path installer -Recurse

    - name: Pack up installer
      run: |
        makensis -V4 MakeInstaller.nsi

    - name: Create Release
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: VioletClientSetup64.exe
