name: Build Project VioletClient on Windows

on:
  push:
    tags: 
      - "v*"
  workflow_dispatch:

env:
  QT_VERSION: "6.9.0"
  QT_HOST: "windows"
  QT_TARGET: "desktop"
  QT_ARCH: "win64_mingw"
  MINGW_VERSION: "mingw81_64"

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4

    - name: Set up NSIS
      shell: powershell
      run: choco install nsis -y --no-progress
      
    - name: Set up Qt with MinGW
      id: setup-qt
      uses: jurplel/install-qt-action@v4
      with:
        version: ${{ env.QT_VERSION }}
        host: ${{ env.QT_HOST }}
        target: ${{ env.QT_TARGET }}
        arch: ${{ env.QT_ARCH }}
        install-deps: true
      
    - name: Set up MinGW
      uses: msys2/setup-msys2@v2
      with:
        update: true
        install: >-
          mingw-w64-x86_64-toolchain
          base-devel
          make

    - name: Configure and build with MinGW
      shell: msys2 {0}
      run: |
        mkdir -p build
        cd build
        # 获取 Qt 安装路径
        QT_PATH="${{ steps.setup-qt.outputs.qt-path }}"
        # 设置 MinGW 环境变量
        export PATH="/mingw64/bin:$PATH"
        # 配置 CMake
        cmake -G "MinGW Makefiles" \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_PREFIX_PATH="$QT_PATH/$MINGW_VERSION" \
          -DCMAKE_C_COMPILER=gcc \
          -DCMAKE_CXX_COMPILER=g++ \
          -DCMAKE_MAKE_PROGRAM=mingw32-make ..
        # 构建项目
        mingw32-make -j4

    - name: Verify files and Get Qt dependencies
      shell: powershell
      run: |
        # 获取 Qt 安装路径
        $QT_PATH = "${{ steps.setup-qt.outputs.qt-path }}"
        $MINGW_DIR = "${{ env.MINGW_VERSION }}"
        $WINDEPLOYQT = Join-Path $QT_PATH $MINGW_DIR "bin" "windeployqt.exe"
        
        # 创建安装程序目录
        New-Item -ItemType Directory -Path "installer" -Force
        
        # 复制可执行文件
        Copy-Item "build/VioletClient.exe" installer/ -Force
        
        Write-Output "Using windeployqt from: $WINDEPLOYQT"
        
        # 运行 windeployqt
        & $WINDEPLOYQT --release --no-compiler-runtime --dir installer installer/VioletClient.exe
        
        # 检查文件
        Write-Output "Installer directory contents:"
        Get-ChildItem -Path installer -Recurse

    - name: Pack up installer
      run: |
        # 确保 NSIS 脚本存在并正确配置
        makensis -V4 MakeInstaller.nsi

    - name: Create Release
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: VioletClientSetup64.exe
