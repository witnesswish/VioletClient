name: Build Project VioletClient on Windows

on:
  push:
    tags: 
      - "v*"
  workflow_dispatch:

env:
  QT_VERSION: 6.5.0  # 修改为存在的Qt版本
  QT_HOST: windows
  QT_TARGET: desktop
  QT_ARCH: win64_mingw

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: ${{ env.QT_VERSION }}
        host: ${{ env.QT_HOST }}
        target: ${{ env.QT_TARGET }}
        arch: ${{ env.QT_ARCH }}
        install-deps: true

    - name: Setup Ninja
      uses: seanmiddleditch/gha-setup-ninja@v3

    - name: Add MinGW to PATH
      shell: powershell
      run: |
        Add-Content $env:GITHUB_PATH "${{ env.QT_DIR }}/../Tools/mingw1120_64/bin"

    - name: Install MinGW runtime libraries
      shell: powershell
      run: |
        # 安装必要的运行时库
        choco install mingw-w64-x86_64-dev -y

    - name: Configure CMake
      shell: powershell
      run: |
        cmake -B ${{github.workspace}}/build `
          -DCMAKE_BUILD_TYPE=Release `
          -DCMAKE_MAKE_PROGRAM=ninja `
          -G "Ninja" `
          -DCMAKE_PREFIX_PATH="${{ env.QT_DIR }}" `
          -DCMAKE_C_COMPILER=gcc.exe `
          -DCMAKE_CXX_COMPILER=g++.exe `
          -DCMAKE_CXX_STANDARD=17 `
          -DQt6_DIR="${{ env.QT_DIR }}/lib/cmake/Qt6"

    - name: Print Qt dir
      shell: powershell
      run: |
        Write-Output "Qt directory: ${{ env.QT_DIR }}"

    - name: Build
      shell: powershell
      run: |
        cmake --build ${{github.workspace}}/build --config Release

    - name: Deploy
      if: github.event_name == 'push'
      shell: powershell
      run: |
        cd ${{github.workspace}}/build
        cmake --install . --prefix package
        # 创建部署脚本并执行
        cmake -DCMAKE_INSTALL_PREFIX=package -P cmake_install.cmake
        # 如果有部署脚本，执行它
        if (Test-Path deploy_script.cmake) {
          cmake -P deploy_script.cmake
        }

    - name: Verify files and Get Qt dependencies
      shell: powershell
      run: |
        $QT_BIN = "$env:QT_DIR/bin"
        & "windeployqt.exe" `
          --release `
          --no-compiler-runtime `
          --dir installer `
          "${{github.workspace}}/build/Release/VioletClient.exe"
        Copy-Item "${{github.workspace}}/build/Release/VioletClient.exe" installer
        Get-ChildItem -Path installer -Recurse

    - name: Pack up installer
      shell: powershell
      run: |
        makensis -V4 MakeInstaller.nsi

    - name: Create Release
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: VioletClientSetup64.exe
