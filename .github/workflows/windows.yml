name: Build Project VioletClient on Windows

on:
  push:
    tags: 
      - "v*"
  workflow_dispatch:

env:
  QT_VERSION: 6.9.0  # 更新为 Qt 6.9
  QT_HOST: windows
  QT_TARGET: desktop
  QT_ARCH: win64_mingw

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: ${{ env.QT_VERSION }}
        host: ${{ env.QT_HOST }}
        target: ${{ env.QT_TARGET }}
        arch: ${{ env.QT_ARCH }}
        install-deps: true

    - name: Setup Ninja
      uses: seanmiddleditch/gha-setup-ninja@v3

    - name: Add MinGW to PATH
      shell: powershell
      run: |
        $mingwPath = "${{ env.QT_DIR }}/../../Tools/mingw1120_64/bin"
        if (Test-Path $mingwPath) {
            Add-Content $env:GITHUB_PATH $mingwPath
        } else {
            Write-Host "Mingw path not found: $mingwPath"
            # 尝试查找其他可能的路径
            $possiblePaths = Get-ChildItem -Path "${{ env.QT_DIR }}/../../Tools" -Filter "mingw*" -Directory
            foreach ($path in $possiblePaths) {
                $binPath = "$($path.FullName)/bin"
                if (Test-Path $binPath) {
                    Add-Content $env:GITHUB_PATH $binPath
                    Write-Host "Added to PATH: $binPath"
                    break
                }
            }
        }

    - name: Configure CMake
      shell: powershell
      run: |
        cmake -B ${{github.workspace}}/build `
          -DCMAKE_BUILD_TYPE=Release `
          -DCMAKE_MAKE_PROGRAM=ninja `
          -G "Ninja" `
          -DCMAKE_PREFIX_PATH="${{ env.QT_DIR }}" `
          -DCMAKE_C_COMPILER=gcc.exe `
          -DCMAKE_CXX_COMPILER=g++.exe `
          -DCMAKE_CXX_STANDARD=17 `
          -DQt6_DIR="${{ env.QT_DIR }}/lib/cmake/Qt6"

    - name: Print Qt dir
      shell: powershell
      run: |
        Write-Output "Qt directory: ${{ env.QT_DIR }}"
        Write-Output "Listing Qt directory:"
        Get-ChildItem "${{ env.QT_DIR }}"

    - name: Build
      shell: powershell
      run: |
        cmake --build ${{github.workspace}}/build --config Release

    - name: Verify files and Get Qt dependencies
      shell: powershell
      run: |
        # 确保 windeployqt 可用
        $windeployqt = "${{ env.QT_DIR }}/bin/windeployqt.exe"
        if (Test-Path $windeployqt) {
            Write-Host "Found windeployqt at: $windeployqt"
        } else {
            Write-Host "windeployqt not found at: $windeployqt"
            # 尝试在其他位置查找
            $windeployqt = Get-ChildItem -Path "${{ env.QT_DIR }}/.." -Recurse -Filter "windeployqt.exe" | Select-Object -First 1
            if ($windeployqt) {
                Write-Host "Found windeployqt at: $($windeployqt.FullName)"
                $windeployqt = $windeployqt.FullName
            } else {
                Write-Error "windeployqt not found anywhere!"
                exit 1
            }
        }
        
        # 创建安装目录
        New-Item -ItemType Directory -Path installer -Force
        
        # 复制可执行文件
        Copy-Item "${{github.workspace}}/build/Release/VioletClient.exe" installer
        
        # 使用 windeployqt 收集依赖
        & $windeployqt `
          --release `
          --no-compiler-runtime `
          --dir installer `
          "installer/VioletClient.exe"
        
        # 显示结果
        Write-Host "Installer directory contents:"
        Get-ChildItem -Path installer -Recurse

    - name: Pack up installer
      shell: powershell
      run: |
        # 检查是否已安装 NSIS
        if (Get-Command makensis -ErrorAction SilentlyContinue) {
            Write-Host "NSIS is already installed"
        } else {
            # 安装 NSIS
            choco install nsis -y
        }
        
        # 运行 NSIS 编译
        makensis -V4 MakeInstaller.nsi

    - name: Create Release
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: VioletClientSetup64.exe
